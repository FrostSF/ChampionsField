<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rocket Hax</title>
<link rel="stylesheet" href="style.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#050810;overflow:hidden;font-family:'Barlow',sans-serif;}

#gameWrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
#game{display:block;max-width:100vw;max-height:100vh;}

/* ══════════════════════════════════════════════════════
   RLCS-STYLE SCOREBOARD — top center
══════════════════════════════════════════════════════ */
#scoreboard{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;
    pointer-events:none;user-select:none;
    font-family:'Barlow Condensed',sans-serif;
}

/* Series title bar (top) */
#sb-series-bar{
    background:rgba(8,10,20,0.92);
    border:1px solid rgba(255,255,255,0.08);
    border-top:none;
    padding:3px 24px;
    display:flex;align-items:center;gap:10px;
    font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);
}
#sb-series-bar .sep{color:rgba(255,255,255,0.2)}
#sb-series-title{color:#fff;font-weight:700;letter-spacing:1.5px;}

/* Main scoreboard row */
#sb-main{
    display:flex;align-items:stretch;
    background:rgba(8,10,20,0.95);
    border:1px solid rgba(255,255,255,0.1);
    border-top:none;
    overflow:hidden;
    box-shadow:0 6px 30px rgba(0,0,0,0.7);
    min-width:420px;
}

/* Team block (colored slab) */
.sb-team-block{
    display:flex;align-items:center;gap:0;
    padding:0;
    position:relative;
}
.sb-color-bar{
    width:8px;height:100%;flex-shrink:0;
}
.sb-team-block.left .sb-color-bar{order:-1;}
.sb-team-block.right .sb-color-bar{order:99;}

.sb-team-inner{
    display:flex;flex-direction:column;align-items:flex-start;padding:6px 14px 6px 10px;
}
.sb-team-block.right .sb-team-inner{align-items:flex-end;padding:6px 10px 6px 14px;}

.sb-team-name{
    font-size:20px;font-weight:900;letter-spacing:1px;
    text-transform:uppercase;color:#fff;line-height:1;
}
.sb-team-logo{
    width:28px;height:28px;border-radius:4px;object-fit:contain;
    background:rgba(255,255,255,0.08);
}

/* Score */
.sb-score-box{
    display:flex;align-items:center;justify-content:center;
    padding:0 6px;min-width:38px;
    font-size:36px;font-weight:900;color:#fff;
    line-height:1;
    background:rgba(255,255,255,0.05);
    border-left:1px solid rgba(255,255,255,0.08);
    border-right:1px solid rgba(255,255,255,0.08);
}

/* Timer center */
#sb-center{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:4px 18px;
    border-left:1px solid rgba(255,255,255,0.08);
    border-right:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
    min-width:88px;
}
#hud-timer{font-size:28px;font-weight:800;color:#fff;letter-spacing:2px;line-height:1;}
#sb-game-row{display:flex;gap:6px;align-items:center;margin-top:2px;}
#sb-game-num,#sb-best-of{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);}
#sb-sep{color:rgba(255,255,255,0.15);font-size:9px;}

/* ══════════════════════════════════════════════════════
   PLAYER SIDE PANELS
══════════════════════════════════════════════════════ */
#blueTeam,#orangeTeam{
    position:absolute;top:82px;
    width:210px;display:flex;flex-direction:column;gap:5px;
    pointer-events:none;
}
#blueTeam  {left:6px;}
#orangeTeam{right:6px;}

/* ══════════════════════════════════════════════════════
   BOOST CIRCLE — bottom center of screen
══════════════════════════════════════════════════════ */
#boost-wrap{
    position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    pointer-events:none;
}
#boost-circle-container{position:relative;width:72px;height:72px;}
#boost-canvas{position:absolute;inset:0;width:72px;height:72px;}
#boost-circle-val{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:#fff;
    letter-spacing:-1px;
}
#boost-label{font-size:9px;letter-spacing:3px;opacity:.35;text-transform:uppercase;color:#fff;font-family:'Barlow',sans-serif;}

/* ══════════════════════════════════════════════════════
   GOAL BANNER
══════════════════════════════════════════════════════ */
#goalBanner{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;opacity:0;transition:opacity .3s;
}
#goalBanner.show{opacity:1;}
#goalWord{
    font-family:'Barlow Condensed',sans-serif;
    font-size:90px;font-weight:900;letter-spacing:12px;text-transform:uppercase;
    -webkit-text-stroke:2px rgba(255,255,255,0.18);
}
#goalSub{font-size:15px;letter-spacing:5px;opacity:.6;margin-top:6px;font-family:'Barlow',sans-serif;font-weight:600;text-transform:uppercase;}

/* ══════════════════════════════════════════════════════
   CONTROLS HINT
══════════════════════════════════════════════════════ */
#ctrlHint{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    font-size:9px;letter-spacing:1.5px;opacity:.22;color:#fff;
    font-family:'Barlow',sans-serif;text-transform:uppercase;white-space:nowrap;margin-bottom:90px;
}
#ctrlHint span{color:#aaffaa;opacity:1;}

/* ══════════════════════════════════════════════════════
   PLAYER CARDS (compact, in game)
══════════════════════════════════════════════════════ */
.playerCard{display:flex;align-items:center;background:rgba(0,0,0,0.72);border-radius:4px;overflow:hidden;height:42px;width:200px;border:1px solid rgba(255,255,255,0.07);}
.avatar-container{width:42px;height:42px;flex-shrink:0;background:#000;}
.pfp{width:100%;height:100%;object-fit:cover;border-right:1px solid rgba(255,255,255,0.08);}
.info-container{flex-grow:1;height:100%;display:flex;flex-direction:column;justify-content:center;padding-left:9px;position:relative;background-size:cover!important;background-position:center!important;}
.info-container::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,.25) 65%,transparent 100%);z-index:1;}
.name{position:relative;z-index:2;font-weight:800;font-size:12px;color:#fff;text-transform:uppercase;text-align:left;}
.playerTitle{position:relative;z-index:2;font-size:8px;font-weight:700;text-transform:uppercase;text-align:left;margin-top:1px;letter-spacing:1px;}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="1600" height="820"></canvas>

  <div id="scoreboard">
    <!-- Series title bar -->
    <div id="sb-series-bar">
      <span id="sb-series-title">FRIENDLY MATCH</span>
      <span class="sep">|</span>
      <span id="sb-game-num">GAME 1</span>
      <span class="sep">|</span>
      <span id="sb-best-of">BEST OF 7</span>
    </div>
    <!-- Main row -->
    <div id="sb-main">
      <!-- Blue team -->
      <div class="sb-team-block left">
        <div class="sb-color-bar" id="sb-blue-block" style="background:#00aaff;"></div>
        <div class="sb-team-inner">
          <span class="sb-team-name" id="sb-blue-name">BLUE</span>
        </div>
      </div>
      <div class="sb-score-box" id="sb-blue-score">0</div>

      <!-- Center timer -->
      <div id="sb-center">
        <div id="hud-timer">5:00</div>
      </div>

      <!-- Orange team -->
      <div class="sb-score-box" id="sb-orange-score">0</div>
      <div class="sb-team-block right">
        <div class="sb-team-inner">
          <span class="sb-team-name" id="sb-orange-name">ORANGE</span>
        </div>
        <div class="sb-color-bar" id="sb-orange-block" style="background:#ff6600;"></div>
      </div>
    </div>
  </div>

  <!-- Side panels -->
  <div id="blueTeam"></div>
  <div id="orangeTeam"></div>

  <!-- Boost circle -->
  <div id="boost-wrap">
    <div id="boost-circle-container">
      <canvas id="boost-canvas" width="72" height="72"></canvas>
      <div id="boost-circle-val">33</div>
    </div>
    <div id="boost-label">Boost</div>
  </div>

  <!-- Goal banner -->
  <div id="goalBanner">
    <div id="goalWord">¡GOL!</div>
    <div id="goalSub">INCREÍBLE</div>
  </div>

  <!-- Controls hint -->
  <div id="ctrlHint">
    <span>WASD</span> mover · <span>Shift</span> boost · <span>Espacio</span> dash
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
